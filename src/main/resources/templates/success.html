<!doctype html>
<html lang="en" xmlns:th="www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h3 class="text text-success">Please find the following ticket details, Happy journey</h3>
    <table class="table table-bordered table-striped">
    	<tr>
    		<td>Ticket Id : </td>
    		<td th:text="${ticket.ticketId}"> </td>
    	</tr>
    	<tr>
    		<td>Passenger Name : </td>
    		<td th:text="${ticket.passengerName}"> </td>
    	</tr>
    	<tr>
    		<td>Train No. : </td>
    		<td th:text="${ticket.trainNo}"> </td>
    	</tr>
    	<tr>
    		<td>Price : </td>
    		<td th:text="${ticket.price}"> </td>
    	</tr>
    	<tr>
    		<td></td>
    		<td ><a href="/" class="btn btn-primary">Back</a></td>
    	</tr>
    	
    </table>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
